<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(92,86,80,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#FAF9F6"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g font-family="'Noto Serif TC', Georgia, serif">
    <rect x="80" y="90" width="360" height="52" rx="10" fill="none" stroke="#B63426" stroke-width="3" transform="rotate(-2 260 116)"/>
    <text x="100" y="126" font-size="26" font-weight="700" fill="#B63426" transform="rotate(-2 260 116)">資料最後查核：2026-07-11</text>
    <text x="80" y="270" font-size="82" font-weight="900" fill="#1C1A19">第一次去大陸旅遊</text>
    <text x="80" y="370" font-size="82" font-weight="900" fill="#1C1A19">臺灣人的一頁式生存聖經</text>
  </g>

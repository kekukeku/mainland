    <text x="272" y="537" fill="#FFFFFF">網路</text>
    <rect x="386" y="500" width="120" height="56" rx="12" fill="#E0A96D"/>
    <text x="410" y="537" fill="#1C1A19">支付</text>
    <rect x="524" y="500" width="120" height="56" rx="12" fill="#F0EDE5"/>
    <text x="548" y="537" fill="#1C1A19">住宿</text>
    <rect x="662" y="500" width="120" height="56" rx="12" fill="#F0EDE5"/>
    <text x="686" y="537" fill="#1C1A19">交通</text>

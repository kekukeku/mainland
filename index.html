        <h1 style="font-size: 1.6rem;">第一次去大陸旅遊：臺灣人行前重點</h1>
        <p>本頁互動功能需要 JavaScript，但以下核心準備事項不需開啟 JavaScript 也能閱讀。資料最後查核：2026-07-11，實際規定以官方最新公告為準。</p>
        <h2>行前五大通關卡</h2>
        <ul>
          <li><strong>臺胞證</strong>：在臺灣提前辦妥，與護照並用，不能互相取代。</li>
          <li><strong>可用網路</strong>：漫遊、免翻牆 eSIM／SIM 或當地門號擇一；先確保臺灣門號能收 OTP。</li>
          <li><strong>雙支付</strong>：出發前安裝並實名支付寶與微信，綁海外信用卡並小額測試。</li>
          <li><strong>合格住宿</strong>：訂房前確認可持臺胞證登記，保留客服文字或截圖。</li>
          <li><strong>交通工具</strong>：高鐵用 12306 或 Trip.com 實名購票，預留安檢時間。</li>
        </ul>
        <h2>緊急備援</h2>
        <ul>
          <li>手機沒電：備妥紙本地址、現金與充電設備。</li>
          <li>沒網路：連機場／飯店 Wi-Fi、同行者熱點、離線截圖。</li>
          <li>支付失敗：切換第二個支付 App、換另一張卡、改付現金。</li>
          <li>證件遺失：先報警取證，再聯絡海基會急難服務與當地出入境單位。</li>
        </ul>
        <p>提醒：帶少量人民幣現金（一般短程約 300–500 元備援），並準備第二張不同發卡機構的信用卡。</p>
